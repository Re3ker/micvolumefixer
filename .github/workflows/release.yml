name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        runtime: [win-x64, win-arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish
        run: dotnet publish -c Release -r ${{ matrix.runtime }}

      - name: Create ZIP
        run: |
          $publishDir = "bin/Release/net10.0-windows/${{ matrix.runtime }}/publish"
          $zipName = "MicVolumeFixer-${{ github.ref_name }}-${{ matrix.runtime }}.zip"
          Compress-Archive -Path "$publishDir/*" -DestinationPath $zipName

      - name: Build installer
        uses: Codeflow-Inc/inno-setup-action@v1
        with:
          filepath: installer/MicVolumeFixer-${{ matrix.runtime }}.iss

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.runtime }}
          path: |
            MicVolumeFixer-${{ github.ref_name }}-${{ matrix.runtime }}.zip
            installer/Output/MicVolumeFixer-*-Setup-*.exe

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.zip
            artifacts/**/*.exe
